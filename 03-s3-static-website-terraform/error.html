<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        color: #ffffff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      
      .error-container {
        text-align: center;
        animation: shake 0.5s ease-in-out;
      }
      
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
      }
      
      .error-code {
        font-size: 8rem;
        font-weight: 800;
        color: #ff9900;
        text-shadow: 0 0 30px rgba(255, 153, 0, 0.5);
        line-height: 1;
        margin-bottom: 1rem;
      }
      
      .error-message {
        font-size: 2rem;
        margin-bottom: 1rem;
        color: #ffffff;
      }
      
      .error-description {
        font-size: 1.125rem;
        color: #aab7b8;
        margin-bottom: 2rem;
        max-width: 500px;
      }
      
      .home-link {
        display: inline-block;
        background: linear-gradient(135deg, #ff9900 0%, #ff6600 100%);
        color: #ffffff;
        padding: 1rem 2rem;
        text-decoration: none;
        border-radius: 30px;
        font-weight: 600;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      
      .home-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(255, 153, 0, 0.3);
      }
      
      .emoji {
        font-size: 4rem;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <div class="emoji">🔍</div>
      <div class="error-code">404</div>
      <h1 class="error-message">Something is amiss...</h1>
      <p class="error-description">
        The page you are looking for seems to have wandered off into the cloud. 
        This is a custom error page served from your S3 static website!
      </p>
      <a href="/" class="home-link">← Back to Home</a>
    </div>
  </body>
</html>
